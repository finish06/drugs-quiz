# Staging deployment — pulls images from registry
# Used by deploy-hook and manual deploys on staging VM at /opt/drugs-quiz/
networks:
  internal:
    name: internal
    driver: bridge
    external: true

services:
  app:
    image: dockerhub.calebdunn.tech/drugs-quiz:beta
    container_name: drugs-quiz
    ports:
      - "8080:80"
    volumes:
      - ./nginx-staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - bff
    restart: unless-stopped
    networks:
      - internal

  bff:
    image: dockerhub.calebdunn.tech/drugs-quiz-bff:beta
    container_name: drugs-quiz-bff
    env_file:
      - .env
    environment:
      - PORT=3001
    expose:
      - "3001"
    restart: unless-stopped
    networks:
      - internal
