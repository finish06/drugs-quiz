name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  quality:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate changelog module
        run: npx tsx scripts/generate-changelog.ts

      - name: Generate SEO files
        run: npx tsx scripts/generate-seo.ts
        env:
          VITE_APP_URL: ${{ secrets.VITE_APP_URL || 'https://rxdrill.com' }}

      - name: Lint
        run: npx eslint .

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx vite build
        env:
          VITE_APP_URL: ${{ secrets.VITE_APP_URL || 'https://rxdrill.com' }}

  docker-personal:
    name: Push to Personal Registry
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Release version: $VERSION"

      - name: Log in to personal registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login dockerhub.calebdunn.tech -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build and push frontend to personal registry
        run: |
          docker build --build-arg VITE_APP_URL="${{ secrets.VITE_APP_URL || 'https://rxdrill.com' }}" \
            -t "dockerhub.calebdunn.tech/drugs-quiz:$VERSION" \
            -t "dockerhub.calebdunn.tech/drugs-quiz:latest" \
            .
          docker push "dockerhub.calebdunn.tech/drugs-quiz:$VERSION"
          docker push "dockerhub.calebdunn.tech/drugs-quiz:latest"

      - name: Build and push BFF to personal registry
        run: |
          docker build \
            -t "dockerhub.calebdunn.tech/drugs-quiz-bff:$VERSION" \
            -t "dockerhub.calebdunn.tech/drugs-quiz-bff:latest" \
            ./bff
          docker push "dockerhub.calebdunn.tech/drugs-quiz-bff:$VERSION"
          docker push "dockerhub.calebdunn.tech/drugs-quiz-bff:latest"

  docker-ghcr:
    name: Push to GitHub Container Registry
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Release version: $VERSION"

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push to ghcr.io
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/drugs-quiz"
          docker build --build-arg VITE_APP_URL="${{ secrets.VITE_APP_URL || 'https://rxdrill.com' }}" \
            -t "$IMAGE:$VERSION" \
            -t "$IMAGE:latest" \
            .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
          echo "Pushed: $IMAGE:$VERSION + :latest"

  deploy-production:
    name: Deploy to Production
    needs: [docker-personal]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/drugs-quiz
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            sleep 5
            # Smoke test
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health)
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "Smoke test failed (HTTP $HTTP_CODE) — rolling back"
              docker compose -f docker-compose.prod.yml down
              docker compose -f docker-compose.prod.yml up -d
              exit 1
            fi
            echo "Production deploy successful (HTTP $HTTP_CODE)"
