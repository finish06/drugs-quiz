name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  quality:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate changelog module
        run: npx tsx scripts/generate-changelog.ts

      - name: Generate SEO files
        run: npx tsx scripts/generate-seo.ts
        env:
          VITE_APP_URL: ${{ secrets.VITE_APP_URL || 'https://rxdrill.com' }}

      - name: Lint
        run: npx eslint .

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Build
        run: npx vite build
        env:
          VITE_APP_URL: ${{ secrets.VITE_APP_URL || 'https://rxdrill.com' }}
          VITE_UMAMI_WEBSITE_ID: ${{ secrets.VITE_UMAMI_WEBSITE_ID || 'cc17e5e2-cfdb-4026-81d5-8f8306a673b6' }}

  docker-personal:
    name: Push to Personal Registry
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Release version: $VERSION"

      - name: Log in to personal registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login dockerhub.calebdunn.tech -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin

      - name: Build and push frontend to personal registry
        run: |
          docker build --build-arg VITE_APP_URL="${{ secrets.VITE_APP_URL || 'https://rxdrill.com' }}" \
            --build-arg VITE_UMAMI_WEBSITE_ID="${{ secrets.VITE_UMAMI_WEBSITE_ID || 'cc17e5e2-cfdb-4026-81d5-8f8306a673b6' }}" \
            -t "dockerhub.calebdunn.tech/drugs-quiz:$VERSION" \
            -t "dockerhub.calebdunn.tech/drugs-quiz:latest" \
            .
          docker push "dockerhub.calebdunn.tech/drugs-quiz:$VERSION"
          docker push "dockerhub.calebdunn.tech/drugs-quiz:latest"

      - name: Build and push BFF to personal registry
        run: |
          docker build --build-arg GIT_COMMIT="${GITHUB_SHA::7}" \
            --build-arg GIT_BRANCH="${GITHUB_REF_NAME}" \
            --build-arg BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "dockerhub.calebdunn.tech/drugs-quiz-bff:$VERSION" \
            -t "dockerhub.calebdunn.tech/drugs-quiz-bff:latest" \
            ./bff
          docker push "dockerhub.calebdunn.tech/drugs-quiz-bff:$VERSION"
          docker push "dockerhub.calebdunn.tech/drugs-quiz-bff:latest"

  docker-ghcr:
    name: Push to GitHub Container Registry
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Release version: $VERSION"

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push to ghcr.io
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/drugs-quiz"
          docker build --build-arg VITE_APP_URL="${{ secrets.VITE_APP_URL || 'https://rxdrill.com' }}" \
            --build-arg VITE_UMAMI_WEBSITE_ID="${{ secrets.VITE_UMAMI_WEBSITE_ID || 'cc17e5e2-cfdb-4026-81d5-8f8306a673b6' }}" \
            -t "$IMAGE:$VERSION" \
            -t "$IMAGE:latest" \
            .
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"
          echo "Pushed: $IMAGE:$VERSION + :latest"

  deploy-production:
    name: Deploy to Production
    needs: [docker-personal]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Copy config files to production
        run: |
          gcloud compute scp \
            docker-compose.prod.yml \
            nginx-prod.conf \
            rxdrill-prod:/tmp/ \
            --zone=us-central1-a \
            --project=rx-quiz-app \
            --tunnel-through-iap

      - name: Deploy via IAP tunnel
        run: |
          gcloud compute ssh rxdrill-prod \
            --zone=us-central1-a \
            --project=rx-quiz-app \
            --tunnel-through-iap \
            --command="
              sudo cp /tmp/docker-compose.prod.yml /tmp/nginx-prod.conf /opt/drugs-quiz/
              sudo chown calebdunn:calebdunn /opt/drugs-quiz/docker-compose.prod.yml /opt/drugs-quiz/nginx-prod.conf
              cd /opt/drugs-quiz
              sudo cp -n /home/calebdunn/.docker/config.json /root/.docker/config.json 2>/dev/null || true
              sudo docker compose -f docker-compose.prod.yml pull
              sudo docker compose -f docker-compose.prod.yml up -d
              sudo docker compose -f docker-compose.prod.yml restart app
              sleep 5
              HTTP_CODE=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:80/api/health)
              echo \"Health check: HTTP \$HTTP_CODE\"
              if [ \"\$HTTP_CODE\" != '200' ]; then
                echo 'Smoke test failed — rolling back'
                sudo docker compose -f docker-compose.prod.yml down
                sudo docker compose -f docker-compose.prod.yml up -d
                exit 1
              fi
              echo 'Production deploy successful'
            "
