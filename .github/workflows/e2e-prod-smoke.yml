name: Production Smoke Tests

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6am UTC
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke test rxdrill.com
    runs-on: ubuntu-latest
    steps:
      - name: Check frontend /health
        run: |
          RESPONSE=$(curl -sf https://rxdrill.com/health)
          echo "Frontend /health: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          if [ "$STATUS" != "healthy" ]; then
            echo "::error::Frontend /health returned status=$STATUS, expected 'healthy'"
            exit 1
          fi

      - name: Check BFF /api/health
        run: |
          RESPONSE=$(curl -sf https://rxdrill.com/api/health)
          echo "BFF /api/health: $RESPONSE"
          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          VERSION=$(echo "$RESPONSE" | jq -r '.version')
          if [ "$STATUS" != "healthy" ]; then
            echo "::error::BFF /api/health returned status=$STATUS, expected 'healthy'"
            exit 1
          fi
          echo "Version: $VERSION"

      - name: Check homepage loads
        run: |
          HTTP_CODE=$(curl -s -o /tmp/index.html -w "%{http_code}" https://rxdrill.com/)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Homepage returned HTTP $HTTP_CODE"
            exit 1
          fi
          # Verify it's actually our app, not a parked page
          if ! grep -q "Rx Drill" /tmp/index.html; then
            echo "::error::Homepage does not contain 'Rx Drill' branding"
            exit 1
          fi

      - name: Check drug-gate API proxy
        run: |
          RESPONSE=$(curl -sf "https://rxdrill.com/api/v1/drugs/names?limit=1")
          if ! echo "$RESPONSE" | jq -e '.data' > /dev/null; then
            echo "::error::Drug API proxy returned unexpected response"
            echo "$RESPONSE"
            exit 1
          fi

      - name: Check auth endpoints
        run: |
          # /api/auth/me unauthenticated should 401
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://rxdrill.com/api/auth/me)
          if [ "$HTTP_CODE" != "401" ]; then
            echo "::error::Expected 401 from /api/auth/me, got $HTTP_CODE"
            exit 1
          fi
          # /api/auth/google should redirect
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://rxdrill.com/api/auth/google)
          if [ "$HTTP_CODE" != "302" ]; then
            echo "::error::Expected 302 from /api/auth/google, got $HTTP_CODE"
            exit 1
          fi

      - name: Check share 404 page
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://rxdrill.com/s/nonexistent)
          if [ "$HTTP_CODE" != "404" ]; then
            echo "::error::Expected 404 from /s/nonexistent, got $HTTP_CODE"
            exit 1
          fi

      - name: Summary
        run: echo "✅ All production smoke tests passed"
