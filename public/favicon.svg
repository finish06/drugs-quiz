<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <clipPath id="pill">
      <rect x="-12" y="-26" width="24" height="52" rx="12"/>
    </clipPath>
    <clipPath id="top">
      <rect x="-12" y="-26" width="24" height="26"/>
    </clipPath>
    <clipPath id="bottom">
      <rect x="-12" y="0" width="24" height="26"/>
    </clipPath>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <g transform="translate(32,32) rotate(-45)">
    <!-- top half: light blue -->
    <g clip-path="url(#top)">
      <rect x="-12" y="-26" width="24" height="52" rx="12" fill="#93c5fd"/>
    </g>
    <!-- bottom half: dark blue gradient -->
    <g clip-path="url(#bottom)">
      <rect x="-12" y="-26" width="24" height="52" rx="12" fill="url(#g)"/>
    </g>
    <!-- score line -->
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#0f172a" stroke-width="2.5"/>
    <!-- D centred in top half (y=-13 is midpoint of -26 to 0) -->
    <g clip-path="url(#pill)">
      <text x="0" y="-13" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="22" fill="#1e3a5f" transform="rotate(45,0,-13)">D</text>
    </g>
    <!-- Q centred in bottom half (y=13 is midpoint of 0 to 26) -->
    <g clip-path="url(#pill)">
      <text x="0" y="13" text-anchor="middle" dominant-baseline="central" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="22" fill="#e2e8f0" transform="rotate(45,0,13)">Q</text>
    </g>
  </g>
</svg>
