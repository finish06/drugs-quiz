<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="#3b82f6" stroke-width="1"/>
    <line x1="200" y1="0" x2="1200" y2="500" stroke="#3b82f6" stroke-width="1"/>
    <line x1="0" y1="130" x2="1000" y2="630" stroke="#3b82f6" stroke-width="1"/>
  </g>

  <!-- Logo icon -->
  <image x="100" y="215" width="200" height="200" href="data:image/jpeg;base64,"/>

  <!-- Title text -->
  <text x="420" y="260" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="72" fill="#f8fafc">drugs-quiz</text>

  <!-- Tagline -->
  <text x="420" y="330" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="32" fill="#94a3b8">Pharmacy Exam Prep</text>

  <!-- Keywords -->
  <text x="420" y="400" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="22" fill="#64748b">NAPLEX &amp; PTCE practice — drug names, classes, brand/generic matching</text>

  <!-- Bottom accent line -->
  <rect x="0" y="610" width="1200" height="20" fill="#3b82f6"/>
</svg>
