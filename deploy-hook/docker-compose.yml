services:
  deploy-hook:
    build: .
    container_name: drugs-quiz-deploy-hook
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - COMPOSE_DIR=/opt/drugs-quiz
      - SMOKE_TEST_URL=http://drugs-quiz:8080
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    name: internal
    external: true
