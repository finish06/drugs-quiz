services:
  deploy-hook:
    build: .
    container_name: deploy-hook
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt:/opt:ro
      - ./apps.yaml:/etc/deploy-hook/apps.yaml:ro
      - ${DOCKER_CONFIG:-/home/finish06/.docker/config.json}:/root/.docker/config.json:ro
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - CONFIG_PATH=/etc/deploy-hook/apps.yaml
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    name: internal
    external: true
